extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1888

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    send_batch_max_size: 1024
    timeout: 5s

exporters:
  otlp_grpc/openobserve:
    endpoint: openobserve:5081
    headers:
      Authorization: "${OPENOBSERVE_AUTH_TOKEN}"
      organization: default
      stream-name: seller_center
    tls:
      insecure: true

  debug:
    verbosity: detailed
    sampling_initial: 10
    sampling_thereafter: 100


service:
  extensions: [health_check, pprof]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/openobserve, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/openobserve, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/openobserve, debug]

