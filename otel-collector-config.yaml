receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1
    send_batch_max_size: 1
    timeout: 1s

exporters:
  otlp_grpc/openobserve:
    endpoint: openobserve:5081
    headers:
      Authorization: "${OPENOBSERVE_AUTH_TOKEN}"
      organization: default
      stream-name: seller_center
    tls:
      insecure: true


service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/openobserve]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/openobserve]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/openobserve]

